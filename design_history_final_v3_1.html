<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 역사 위계도 V3.1 (Final Snapshot)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b0c; --bg2:#131315; --bg3:#1a1a1e; --bg4:#1f1f24;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --text:#dedad2; --muted:#5e5c57; --muted2:#35342f;
  --c1:#c8a96e; --c2:#c8816e; --c3:#a96ec8;
  --c4:#6e9ec8; --c5:#c86e8a; --c6:#6ec8a9; --c7:#c8b86e; --c8:#6e7ec8;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR',sans-serif; font-weight:300;
  display:flex; flex-direction:column;
}

/* TOP */
.top{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; border-bottom:1px solid var(--border);
  flex-shrink:0; z-index:50;
  background: rgba(11, 11, 12, 0.8);
  backdrop-filter: blur(20px);
}
.top-title{font-family:'DM Serif Display',serif;font-size:18px}
.top-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.top-hint{font-size:10px;color:var(--muted); font-family: 'DM Mono', monospace;}

/* CANVAS */
.canvas{flex:1;overflow-x:auto; overflow-y:hidden; display:flex;}

/* GRID: Horizontal Flow */
.grid{
  display:flex;
  align-items:flex-start;
  min-height:100%;
  padding-top: 20px;
}

/* ERA COLUMN */
.era-col{
  flex-shrink:0;
  width:320px;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height: 100%;
}
.era-col:last-child{border-right:none}

/* ERA HEADER */
.era-head{
  position:sticky; top:0; z-index:5;
  background:var(--bg);
  border-bottom:3px solid;
  padding:20px 20px 16px;
}
.era-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.era-name{font-size:16px;font-weight:500;line-height:1.2;margin-bottom:4px}
.era-period{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px}
.era-bg{
  font-size:9px;color:var(--muted);
  display:flex;flex-wrap:wrap;gap:4px;
}
.era-bg-pill{
  padding:2px 8px;border-radius:2px;
  border:1px solid var(--border);
  background:var(--bg2);
  white-space:nowrap;
}

/* NEXT CONNECTOR */
.era-next{
  padding:12px 20px;
  font-size:10px;color:var(--muted);
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  line-height:1.6;
  display:flex;gap:8px;align-items:flex-start;
}
.era-next-arrow{flex-shrink:0;font-size:12px}

/* MOVEMENTS SCROLL AREA (Vertical within Col if needed, but here we stack) */
.movements-container{
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 60px 12px;
}
.movements{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MOVEMENT CARD */
.mov{
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  background:var(--bg2);
  transition: border 0.2s;
}
.mov:hover{ border-color: var(--border2); }

/* MOV HEADER */
.mov-head{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.mov-dot{
  width:7px;height:7px;border-radius:50%;
  flex-shrink:0;margin-top:5px;
}
.mov-info{flex:1; min-width:0;}
.mov-name{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:4px; word-break: keep-all;}
.mov-art-tag{
  display:inline-block;font-size:8px;
  padding:1px 5px;border-radius:2px;
  background:rgba(200,110,138,.12);color:#c86e8a;
  margin-bottom:5px;
}
.mov-cases{font-size:9px;color:var(--muted);line-height:1.6}
.mov-cases b{color:var(--text);font-weight:400}
.mov-modern{
  margin-top:8px;font-size:9px;
  padding:6px 10px;border-radius:4px;
  border:1px solid;
  line-height:1.4;
}

/* TREE: TRENDS */
.tree-section{
  padding:10px 14px 12px 14px;
}
.tree-label{
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.tree-label::before{
  content:'';display:block;
  width:14px;height:1px;background:var(--muted2);
}

/* TREND ROW */
.trend-row{
  display:flex;align-items:flex-start;
  padding:2px 0;
}
.trend-line{
  width:18px;flex-shrink:0;
  position:relative;
  align-self:stretch;
}
.trend-line::before{
  content:'';position:absolute;
  left:7px;top:0;bottom:0;
  width:1px;background:var(--muted2);
}
.trend-row:last-child .trend-line::before,
.trend-row:last-child .trend-line::after{
    display: none;
}
.trend-line::after{
  content:'';position:absolute;
  left:7px;top:10px;
  width:8px;height:1px;
  background:var(--muted2);
}
.trend-body{flex:1;padding-bottom:4px}
.trend-name{
  font-size:10px;color:var(--text);
  padding:2px 0;line-height:1.4;
}

/* TECH ROWS nested under trend */
.tech-rows{padding-left:14px; margin-top: 2px;}
.tech-row{
  display:flex;align-items:flex-start;gap:0;
  padding:1px 0;
}
.tech-line{
  width:16px;flex-shrink:0;position:relative;align-self:stretch;
}
.tech-line::before{
  content:'';position:absolute;
  left:6px;top:0;bottom:0;
  width:1px;background:var(--muted2);
  opacity:.5;
}
.tech-row:last-child .tech-line::before{
    height: 8px;
    bottom: auto;
}
.tech-line::after{
  content:'';position:absolute;
  left:6px;top:8px;
  width:7px;height:1px;
  background:var(--muted2);opacity:.5;
}
.tech-name{
  font-size:9px;color:var(--muted);
  padding:1px 0;line-height:1.4;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* BACKGROUND GRADIENT */
.bg-glow{
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: -1;
    background: radial-gradient(circle at 20% 30%, rgba(200, 169, 110, 0.03), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(110, 158, 200, 0.03), transparent 40%);
}
</style>
</head>

          { name:'컴퓨터 기반 그래픽', techs:['DTP 시스템','PostScript 기술'] },
        ]},
    ]
  },
  {
    num:'08', name:'디지털 초기 시대', period:'1990s ~ 2007', color:'#6e7ec8',
    bg:['인터넷 보급','GUI 완성','모바일 혁명 직전'],
    next:'아이폰 출시 → 스마트폰 생태계 → UX/UI 디자인의 시대',
    movements:[
      { name:'도트 그래픽 & 픽셀 아트', color:'#6e7ec8',
        work:'초기 윈도우 아이콘 · 비디오 게임',
        modern:'뉴트로 미학 · 8비트 감성 디자인',
        trends:[
          { name:'저해상도 환경', techs:['픽셀 단위 드로잉','인덱스 컬러'] },
          { name:'아이콘 메타포', techs:['GUI 아이콘 디자인'] },
        ]},
      { name:'웹 1.0 & 테이블 레이아웃', color:'#6e7ec8',
        work:'야후! · 넷스케이프',
        modern:'구조적 정보 설계 · 데이터 위계 디자인',
        trends:[
          { name:'HTML 기반 구조', techs:['테이블 레이아웃','하이퍼텍스트'] },
        ]},
      { name:'스큐어모피즘', color:'#6e7ec8',
        work:'초기 iOS 엠보싱 버튼',
        modern:'사실적 인터페이스 · 물리적 메타포 UI',
        trends:[
          { name:'질감 모사', techs:['베벨 & 엠보스','드롭 섀도우'] },
          { name:'물리 도구 재현', techs:['3D 렌더링 아이콘'] },
        ]},
      { name:'플래시 & 모션 웹', color:'#6e7ec8',
        brand:'Adobe Flash',
        modern:'마이크로 인터랙션 · 풍부한 모먼트 디자인',
        trends:[
          { name:'비선형 인터페이스', techs:['액션스크립트','벡터 애니메이션'] },
        ]},
    ]
  },
];

const grid = document.getElementById('grid');

ERAS.forEach(era => {
  const col = document.createElement('div');
  col.className = 'era-col';

  // Header
  const head = document.createElement('div');
  head.className = 'era-head';
  head.style.borderColor = era.color;
  head.innerHTML = `
    <div class="era-num">${era.num}</div>
    <div class="era-name" style="color:${era.color}">${era.name}</div>
    <div class="era-period">${era.period}</div>
    <div class="era-bg">${era.bg.map(b=>`<span class="era-bg-pill">${b}</span>`).join('')}</div>
  `;
  col.appendChild(head);

  // Next connector
  const next = document.createElement('div');
  next.className = 'era-next';
  next.innerHTML = `<span class="era-next-arrow" style="color:${era.color}">↓</span><span>${era.next}</span>`;
  col.appendChild(next);

  // Movements Container
  const movCont = document.createElement('div');
  movCont.className = 'movements-container';
  
  const movs = document.createElement('div');
  movs.className = 'movements';

  era.movements.forEach(mov => {
    const card = document.createElement('div');
    card.className = 'mov';

    // Mov header
    const mhead = document.createElement('div');
    mhead.className = 'mov-head';
    let casesHtml = '';
    if (mov.person) casesHtml += `<b>${mov.person}</b><br>`;
    if (mov.work)   casesHtml += `<span style="color:var(--muted)">${mov.work}</span><br>`;
    if (mov.brand)  casesHtml += `<span style="color:var(--muted)">${mov.brand}</span>`;
    mhead.innerHTML = `
      <div class="mov-dot" style="background:${mov.color}"></div>
      <div class="mov-info">
        ${mov.art ? '<span class="mov-art-tag">미술→디자인</span>' : ''}
        <div class="mov-name" style="color:${mov.color}">${mov.name.replace('ㆍ미술→디자인','')}</div>
        <div class="mov-cases">${casesHtml}</div>
        <div class="mov-modern" style="color:${mov.color};border-color:${mov.color}44">↗ ${mov.modern}</div>
      </div>
    `;
    card.appendChild(mhead);

    // Trends + Techs tree
    const tree = document.createElement('div');
    tree.className = 'tree-section';
    const tlbl = document.createElement('div');
    tlbl.className = 'tree-label';
    tlbl.textContent = '트렌드 → 기법';
    tree.appendChild(tlbl);

    mov.trends.forEach((tr, ti) => {
      const isLastTrend = ti === mov.trends.length - 1;

      const trow = document.createElement('div');
      trow.className = 'trend-row';

      const tline = document.createElement('div');
      tline.className = 'trend-line';
      
      // 마지막 요소일 때 기둥 선이 아래로 삐져나가지 않도록 인라인 스타일 마스크 주입
      if (isLastTrend) {
        tline.innerHTML = `
          <span style="position:absolute;left:7px;top:0;height:10px;width:1px;background:var(--muted2);display:block"></span>
          <span style="position:absolute;left:7px;top:10px;width:8px;height:1px;background:var(--muted2);display:block"></span>
        `;
      }
      
      const tbody = document.createElement('div');
      tbody.className = 'trend-body';

      const tname = document.createElement('div');
      tname.className = 'trend-name';
      tname.textContent = tr.name;
      tbody.appendChild(tname);

      // Techs
      if (tr.techs && tr.techs.length) {
        const techRows = document.createElement('div');
        techRows.className = 'tech-rows';
        tr.techs.forEach((tech, techI) => {
          const techRow = document.createElement('div');
          techRow.className = 'tech-row';
          const techLine = document.createElement('div');
          techLine.className = 'tech-line';
          const techName = document.createElement('div');
          techName.className = 'tech-name';
          techName.textContent = tech;
          techRow.appendChild(techLine);
          techRow.appendChild(techName);
          techRows.appendChild(techRow);
        });
        tbody.appendChild(techRows);
      }

      trow.appendChild(tline);
      trow.appendChild(tbody);
      tree.appendChild(trow);
    });

    card.appendChild(tree);
    movs.appendChild(card);
  });

  movCont.appendChild(movs);
  col.appendChild(movCont);
  grid.appendChild(col);
});
</script>
</body>
</html>
